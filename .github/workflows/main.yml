name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          java-version: 26
          distribution: temurin
      - name: Verify
        run: ./mvnw verify
